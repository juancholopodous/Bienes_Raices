<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienes Raices</title>
    <link rel="stylesheet" href="build/css/app.css">
</head>
<body>

    <header class="header">
        <div class="contenedor contenido-header">
            <div class="barra">
                <a href="/"> <!-- enlace a la ventana principal -->
                    <img src="build/img/logo.svg" alt="Logotipo de Bienes Raices">
                </a>
                
                <div class="mobile-menu">
                    <img src="build/img/barras.svg" alt="icono responsive">
                </div>

                <div class="derecha">
                    <img class="dark-mode-boton" src="build/img/dark-mode.svg">
                    
                    <nav class="navegacion">
                        <a href="nosotros.html">Nosotros</a>
                        <a href="anuncios.html">Anuncios</a>
                        <a href="blog.html">Blog</a>
                        <a href="contacto.html">Contacto</a>
                    </nav>
                </div>

            </div><!-- Cierre de Barra -->
        </div>
    </header>

    <main class="contenedor seccion">
        <h1>Contacto</h1>

        <picture>
            <source srcset="build/img/destacada3.webp" type="image/webp">
            <source srcset="build/img/destacada3.jpg" type="image/jpeg">
            <img loading="lazy" src="build/img/destacada3.jpg" alt="imagen ">
        </picture>

        <h2>Llene el formulario de contacto</h2>

        <form class="formulario" action=""><!-- TODOS LOS FORMULARIOS VAN DENTRO DE UN FORM -->
            <fieldset> <!-- Agrupamos conjunto de campos relacionados -->
                <legend>Información Personal</legend>

                <label for="nombre">Nombre</label>
                <input type="text" placeholder="Tu Nombre" id="nombre">

                <label for="email">E-mail</label>
                <input type="email" placeholder="Tu Email" id="email">

                <label for="celular">Teléfono</label>
                <input type="tel" placeholder="Tu Teléfono" id="celular">

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje"></textarea>
            </fieldset><!-- Cierre de 1° grupo -->

            <fieldset>
                <legend>Información sobre la Propiedad</legend>

                <label for="opciones">Vende ó Compra:</label>
                <select id="opciones">
                    <option value="" selected disabled>-- Seleccione --</option>
                    <option value="Compra">Compra</option><!-- El valor del VALUE es lo que se envia al servidor -->
                    <option value="Vende">Vende</option>
                </select>

                <label for="Presupuesto">Precio ó Presupuesto</label>
                <input type="number" placeholder="Tu Precio ó Presupuesto" id="Presupuesto">
            </fieldset><!-- Cierre de 2° grupo -->

            <fieldset>
                <legend>Contacto</legend>

                <p>Como desea ser contactado:</p>
                <div class="forma-contacto">
                    <label for="contactar-telefono">Teléfono</label>
                    <input name="contacto" type="radio" value="telefono" id="contactar-telefono">
                    <!-- el NAME es el mismo en ambos para que solo se tome uno, lo distinto es el VALUE -->
                    <label for="contactar-email">E-mail</label>
                    <input name="contacto" type="radio" value="email" id="contactar-email">
                </div>

                <p>Sí eligió Teléfono elija la fecha y la hora</p>

                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha">

                <label for="hora">Hora:</label>
                <input type="time" id="hora" min="09:00" max="18:00"><!-- min y max establece el rango que se puede seleccionar -->
            </fieldset><!-- Cierre de 3° grupo -->

            <input type="submit" value="Enviar" class="boton-verde">
        </form>

    </main>

    <footer class="footer seccion">
        <div class="contenedor contenedor-footer">
            <nav class="navegacion">
                <a href="nosotros.html">Nosotros</a>
                <a href="anuncios.html">Anuncios</a>
                <a href="blog.html">Blog</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>

        <p class="copyright">Todos los derechos Reservados 2026 &copy;</p>
    </footer>

    <script src="build/js/bundle.min.js"></script>
</body>
</html>
